# ref
# starship configuration reference: https://starship.rs/config/
# inspired by Pastel Powerline Preset: https://starship.rs/presets/pastel-powerline.html
# nerd font cheet sheet: https://www.nerdfonts.com/cheat-sheet
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](fg:1_bg)\
$os\
[¯é░](bg:2_bg fg:1_bg)\
$directory\
[¯é░](bg:3_bg fg:2_bg)\
$git_branch\
$git_status\
[¯é░](bg:4_bg fg:3_bg)\
$golang\
$python\
$haskell\
$nodejs\
[¯é░](bg:5_bg fg:4_bg)\
$time\
[¯é░](bg:6_bg fg:5_bg)\
$cmd_duration\
[¯é░](fg:6_bg)\
\n$character"""

# Disable the blank line at the start of the prompt
add_newline = false

palette = "eyemono"

[palettes.eyemono]
1_bg = '#FF4FDB'
2_bg = '#B274FF'
3_bg = '#08C6E9'
4_bg = '#17EDC6'
5_bg = '#85E33C'
6_bg = '#EEF300'
1_fg = '#191E1F'
2_fg = '#191E1F'
3_fg = '#191E1F'
4_fg = '#191E1F'
5_fg = '#191E1F'
6_fg = '#191E1F'

[os]
style = "bg:1_bg fg:1_fg"
disabled = false

[directory]
style = "bg:2_bg fg:2_fg"
format = "[ ´ü╝ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
read_only = " ¯éó"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░êÖ"
"Downloads" = "´ÇÖ"
"Music" = "´Çü"
"Pictures" = "´Ç¥"

[git_branch]
style = "bg:3_bg fg:3_fg"
format = '[ ´Éİ $branch ]($style)'

[git_status]
style = "bg:3_bg fg:3_fg"
format = '[$all_status$ahead_behind]($style)'
conflicted = '´çó '
stashed = '¯£ç '
deleted = '´ç© '
renamed = '¾░İÄ '
modified = '´üÇ '
staged = '´üğ $count '
untracked = '´ä¿ '
ahead = '´üó ${count} '
behind = '´üú ${count} '
diverged = '´üó ${ahead_count} ´üú ${behind_count} '
up_to_date = '´Çî '

[golang]
symbol = "¯İğ"
style = "bg:4_bg fg:4_fg"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "¯İå"
style = "bg:4_bg fg:4_fg"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "¯£İ"
style = "bg:4_bg fg:4_fg"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"                        # Hour:Minute Format
style = "bg:5_bg fg:5_fg"
format = '[ @$time ]($style)'

[cmd_duration]
min_time = 500
style = "bg:6_bg fg:6_fg"
format = "[ ´ôú $duration ]($style)"

[os.symbols]
Ubuntu = "´îø "
